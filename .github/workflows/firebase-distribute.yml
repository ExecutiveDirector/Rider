name: Build & Distribute Rider App

# Runs whenever you push to main — builds a release APK and pushes it to
# Firebase App Distribution. Riders on your tester list get a notification
# and can tap to install, no Play Store review needed.
#
# Setup (one-time, same as the vendor app):
#   1. In Firebase Console → Project Settings → General, copy the Android
#      app ID for the Rider app (looks like 1:123456789:android:abcdef).
#      Add it as a repo secret: FIREBASE_ANDROID_APP_ID
#   2. In Firebase Console → Project Settings → Service Accounts, generate
#      a new private key (JSON). Add its full contents as a repo secret:
#      FIREBASE_SERVICE_ACCOUNT
#   3. In Firebase Console → App Distribution → Testers & Groups, create
#      a group called "riders" (or change the `groups:` line below to
#      match whatever group you use) and add your test riders' emails.
#   4. Release signing — the keystore itself never touches the repo:
#        - Base64-encode your .jks (`base64 -w0 aquagas-rider-release.jks`)
#          and add the output as secret: RIDER_KEYSTORE_BASE64
#        - Add three more secrets matching what you set when you ran
#          keytool: RIDER_KEYSTORE_PASSWORD, RIDER_KEY_ALIAS,
#          RIDER_KEY_PASSWORD
#      The "Reconstruct signing keystore" step below decodes the secret
#      back into a real .jks and writes key.properties right before the
#      build — android/app/build.gradle.kts picks both up automatically
#      (falls back to debug signing if these secrets aren't set at all).
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'   # matches vendor app / your local dev version
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # If you have tests, keep this — it stops a broken build from ever
      # reaching a rider's phone. Remove the step if you don't have tests yet.
      - name: Run tests
        run: flutter test
        continue-on-error: true   # set to false once you're confident in your test suite

      # Writes android/app/keystore/rider-release.jks and android/key.properties
      # from secrets — neither file ever lives in the repo. If the secret
      # isn't set yet, the script just logs that and exits early, and
      # build.gradle.kts falls back to debug signing — so this won't break
      # a first run before you've configured these secrets.
      #
      # NOTE: GitHub Actions doesn't allow the `secrets` context inside an
      # `if:` condition (that's the "Unrecognized named-value: secrets"
      # error) — so the presence check has to happen inside the shell
      # script itself, via env vars, instead.
      - name: Reconstruct signing keystore
        env:
          RIDER_KEYSTORE_BASE64: ${{ secrets.RIDER_KEYSTORE_BASE64 }}
          RIDER_KEYSTORE_PASSWORD: ${{ secrets.RIDER_KEYSTORE_PASSWORD }}
          RIDER_KEY_PASSWORD: ${{ secrets.RIDER_KEY_PASSWORD }}
          RIDER_KEY_ALIAS: ${{ secrets.RIDER_KEY_ALIAS }}
        run: |
          if [ -z "$RIDER_KEYSTORE_BASE64" ]; then
            echo "RIDER_KEYSTORE_BASE64 not set — skipping, build will fall back to debug signing."
            exit 0
          fi
          mkdir -p android/app/keystore
          echo "$RIDER_KEYSTORE_BASE64" | base64 -d > android/app/keystore/rider-release.jks
          {
            echo "storePassword=$RIDER_KEYSTORE_PASSWORD"
            echo "keyPassword=$RIDER_KEY_PASSWORD"
            echo "keyAlias=$RIDER_KEY_ALIAS"
            echo "storeFile=app/keystore/rider-release.jks"
          } > android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: Riders
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Auto-build from commit ${{ github.sha }}
            ${{ github.event.head_commit.message }}